  - defaults
dependencies:
  - python=3.8.20
  - numpy=1.24.3
  - pandas=2.0.3
  - matplotlib=3.7.2
  - scipy=1.10.1
  - scikit-learn=1.3.0
  - scikit-image=0.19.2
